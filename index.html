<head>

  <!-- Mapbox GL JS v3 -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />

  <!-- Medieval fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+DW+Pica:ital@0;1&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'Ghosthey';
      src: url('assets/ghosthey/ghosthey-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0d0a04;
      font-size: 16px;
    }

    /* ── Map ── */
    #map {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
    }
    /* Hide Mapbox attribution */
    .mapboxgl-ctrl-bottom-left,
    .mapboxgl-ctrl-bottom-right { display: none !important; }

    /* ── Aged parchment overlay on the map ── */
    #map-tint {
      position: fixed;
      inset: 0;
      background: rgba(140, 95, 30, 0.18);
      mix-blend-mode: multiply;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Vignette ── */
    #vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 75% at 50% 50%,
        transparent 30%,
        rgba(10, 6, 0, 0.55) 75%,
        rgba(5, 3, 0, 0.82) 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* ── Page header ── */
    #header {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      text-align: center;
    }
    #title-wrap {
      position: relative;
      display: block;
      width: fit-content;
      margin: 0 auto;
    }
    #header h1 {
      font-family: 'Ghosthey', serif;
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 400;
      text-transform: none;
      color: #f2d270;
      letter-spacing: 0.08em;
      visibility: hidden;
    }
    #title-canvas {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      filter:
        drop-shadow(0 0 24px rgba(220, 170, 40, 0.55))
        drop-shadow(0 0 48px rgba(200, 130, 20, 0.25))
        drop-shadow(2px 3px 8px rgba(0,0,0,0.9));
    }
    #subtitle-wrap {
      position: relative;
      display: block;
      width: fit-content;
      margin: 4px auto 0;
    }
    #header .subtitle {
      font-family: 'IM Fell DW Pica', serif;
      font-style: italic;
      font-size: clamp(1rem, 3vw, 2.3rem);
      color: rgba(230, 195, 100, 0.75);
      margin-top: 0;
      letter-spacing: 0.12em;
      visibility: hidden;
    }
    #subtitle-canvas {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      filter: drop-shadow(1px 1px 4px rgba(0,0,0,0.9));
    }
    #header .ornament-line {
      font-family: 'IM Fell DW Pica', serif;
      color: rgba(210, 165, 60, 0.45);
      font-size: 1.1rem;
      letter-spacing: 0.5em;
      margin-top: 6px;
    }

    /* ── Footer ── */
    #footer {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      text-align: center;
    }
    #footer p {
      font-family: 'IM Fell DW Pica', serif;
      font-style: italic;
      font-size: 0.82rem;
      color: rgba(220, 180, 80, 0.5);
      text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
      letter-spacing: 0.15em;
    }

    /* ── Wax Seal Buttons ── */

    .seal-row {
      display: flex;
      gap: 36px;
      justify-content: center;
      margin-top: 36px;
    }

    .seal-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: transform 0.25s ease;
    }
    .seal-btn:hover  { transform: translateY(-4px) scale(1.04); }
    .seal-btn:active { transform: translateY(-1px) scale(1.01); }

    .seal {
      width: 110px;
      height: 110px;
      position: relative;
      filter:
        drop-shadow(0 6px 18px rgba(0,0,0,0.8))
        drop-shadow(0 0 10px rgba(160,20,20,0.25));
    }

    /* Irregular drip edge — two stacked radial blobs */
    .seal-wax {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(ellipse 94% 96% at 48% 46%,
        #ab1e3a 0%,
        #770e23 55%,
        #510716 80%,
        #6e0a1e 100%
      );
      /* Slightly uneven edge via box-shadow inset highlight */
      box-shadow:
        inset  3px  4px 10px rgba(220, 60, 40, 0.35),
        inset -2px -3px  8px rgba(0,0,0,0.45),
        inset  0   0   22px rgba(0,0,0,0.25);
      /* Rough edge via clip-path polygon approximating a blob */
      clip-path: polygon(
        50%  0%,  62%  2%,  74%  5%,  84% 11%,  92% 18%,
        98% 27%, 100% 38%, 99% 50%,  97% 61%,  92% 72%,
        84% 81%,  74% 88%,  62% 93%,  50% 95%,  38% 93%,
        26% 88%,  16% 81%,   8% 72%,   3% 61%,   1% 50%,
         2% 38%,   6% 27%,  12% 18%,  20% 11%,  30%  5%,  40%  2%
      );
    }

    /* Raised rim ring */
    .seal-rim {
      position: absolute;
      inset: 7px;
      border-radius: 50%;
      border: 2px solid rgba(220, 80, 60, 0.35);
      box-shadow:
        inset 0 0 6px rgba(0,0,0,0.4),
        0 0 4px rgba(200,50,30,0.2);
      pointer-events: none;
    }

    /* Inner content area */
    .seal-face {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .seal-icon {
      font-size: 1.5rem;
      line-height: 1;
      color: rgba(255, 200, 180, 0.55);
      display: block;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    }

    .seal-label {
      font-family: 'IM Fell DW Pica', serif;
      font-style: italic;
      font-size: 0.68rem;
      color: rgba(255, 210, 190, 0.85);
      letter-spacing: 0.08em;
      line-height: 1.5;
      text-align: center;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }

  </style>
</head>

    // ── Initialise map (non-interactive — we drive it manually) ──
    const map = new mapboxgl.Map({
      container: 'map',
      style: STYLE,
      center: [-0.081225, 51.503827],
      zoom: 15.9,
      bearing: -18.40,
      pitch: 67.63,
      interactive: false,
      attributionControl: false,
      preserveDrawingBuffer: true
    });

    // ================================================================
    //  Mouse-driven panning
    //  • When cursor is over the map background → pan slowly toward mouse
    //  • When cursor enters a scroll → pause panning
    // ================================================================
    let mouseX = window.innerWidth  / 2;
    let mouseY = window.innerHeight / 2;
    let panPaused = false;
    let mapReady  = false;

    // Tune these to taste
    const PAN_MAX_SPEED  = 0.008;   // deg/frame at screen edge
    const DEAD_ZONE      = 0.01;    // fraction of half-viewport that triggers no pan
    const PAN_EASE       = 0.06;    // lerp factor — lower = lazier

    let velX = 0, velY = 0;         // current pan velocity (degrees/frame)
    let mouseInWindow = true;

    document.addEventListener('mousemove', e => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    // Stop panning when cursor leaves the browser window
    document.addEventListener('mouseleave', () => { mouseInWindow = false; velX = 0; velY = 0; });
    document.addEventListener('mouseenter', () => { mouseInWindow = true;  });

    // Pause panning over scrolls
    document.querySelectorAll('.scroll-col').forEach(el => {
      el.addEventListener('mouseenter', () => { panPaused = true;  });
      el.addEventListener('mouseleave', () => { panPaused = false; });
    });

    function panTick() {
      if (mapReady && !panPaused && mouseInWindow) {
        const hw = window.innerWidth  / 2;
        const hh = window.innerHeight / 2;

        // Normalise mouse offset: -1 … +1
        const nx = (mouseX - hw) / hw;
        const ny = (mouseY - hh) / hh;

        // Apply dead zone
        const ax = Math.abs(nx) > DEAD_ZONE ? Math.sign(nx) * (Math.abs(nx) - DEAD_ZONE) / (1 - DEAD_ZONE) : 0;
        const ay = Math.abs(ny) > DEAD_ZONE ? Math.sign(ny) * (Math.abs(ny) - DEAD_ZONE) / (1 - DEAD_ZONE) : 0;

        // Scale speed by zoom so apparent screen velocity stays constant:
        // each extra zoom level halves the degrees needed to move the same pixels.
        const speed    = PAN_MAX_SPEED * Math.pow(2, 5 - map.getZoom());
        const targetVX =  ax * speed;
        const targetVY = -ay * speed;   // invert: mouse-down → south

        // Smooth velocity
        velX += (targetVX - velX) * PAN_EASE;
        velY += (targetVY - velY) * PAN_EASE;

        if (Math.abs(velX) > 1e-6 || Math.abs(velY) > 1e-6) {
          const c   = map.getCenter();
          // Bounding box: UK + Republic of Ireland (inc. Shetland & western Ireland)
          const BOUNDS = { minLng: -8.5, maxLng: 0.1, minLat: 51.5, maxLat: 59.0 };
          const newLng = Math.max(BOUNDS.minLng, Math.min(BOUNDS.maxLng, c.lng + velX));
          const newLat = Math.max(BOUNDS.minLat, Math.min(BOUNDS.maxLat, c.lat + velY));
          // Kill velocity on any clamped axis so the edge doesn't feel sticky
          if (newLng !== c.lng + velX) velX = 0;
          if (newLat !== c.lat + velY) velY = 0;
          map.setCenter([newLng, newLat]);
        }
      }
      drawTitle();
      drawSubtitle();
      requestAnimationFrame(panTick);
    }

    // ── Title pixel shader ──
    const titleCanvas  = document.getElementById('title-canvas');
    const titleCtx     = titleCanvas.getContext('2d');
    const titleH1      = document.querySelector('#header h1');
    const maskCvs      = document.createElement('canvas');
    const maskCtx      = maskCvs.getContext('2d');
    const regionCvs    = document.createElement('canvas');
    const regionCtx    = regionCvs.getContext('2d');

    const GOLD         = [242, 210, 112];  // #f2d270
    const BURGUNDY     = [110,  10,  30];  // deep burgundy
    const LUM_THRESH   = 150;               // 0-255: above = light = burgundy

    let titleFontReady = false;
    document.fonts.ready.then(() => { titleFontReady = true; });

    function drawTitle() {
      if (!titleFontReady || !mapReady) return;

      const dpr  = window.devicePixelRatio || 1;
      const rect = titleH1.getBoundingClientRect();
      const cw   = Math.round(rect.width  * dpr);
      const ch   = Math.round(rect.height * dpr);
      if (cw === 0 || ch === 0) return;

      if (titleCanvas.width !== cw || titleCanvas.height !== ch) {
        titleCanvas.width  = cw;  titleCanvas.height = ch;
        titleCanvas.style.width  = rect.width  + 'px';
        titleCanvas.style.height = rect.height + 'px';
        maskCvs.width   = cw;  maskCvs.height   = ch;
        regionCvs.width = cw;  regionCvs.height = ch;
      }

      const fontSize = parseFloat(getComputedStyle(titleH1).fontSize) * dpr;
      maskCtx.clearRect(0, 0, cw, ch);
      maskCtx.font          = `400 ${fontSize}px 'Ghosthey'`;
      maskCtx.letterSpacing = `${(0.08 * fontSize).toFixed(1)}px`;
      maskCtx.textAlign     = 'center';
      maskCtx.textBaseline  = 'middle';
      maskCtx.fillStyle     = 'white';
      maskCtx.fillText('Find Land', cw / 2, ch / 2);
      const maskData = maskCtx.getImageData(0, 0, cw, ch);

      regionCtx.clearRect(0, 0, cw, ch);
      regionCtx.drawImage(
        map.getCanvas(),
        Math.round(rect.left * dpr), Math.round(rect.top * dpr), cw, ch,
        0, 0, cw, ch
      );
      const mapPx = regionCtx.getImageData(0, 0, cw, ch).data;

      const out = titleCtx.createImageData(cw, ch);
      const md  = maskData.data;
      const od  = out.data;
      for (let i = 0; i < md.length; i += 4) {
        const a = md[i + 3];
        if (a < 6) continue;
        const lum = 0.299 * mapPx[i] + 0.587 * mapPx[i + 1] + 0.114 * mapPx[i + 2];
        const col = lum < LUM_THRESH ? GOLD : BURGUNDY;
        od[i] = col[0];  od[i+1] = col[1];  od[i+2] = col[2];  od[i+3] = a;
      }
      titleCtx.clearRect(0, 0, cw, ch);
      titleCtx.putImageData(out, 0, 0);
    }

    // ── Subtitle pixel shader ──
    const subtitleCanvas = document.getElementById('subtitle-canvas');
    const subtitleCtx    = subtitleCanvas.getContext('2d');
    const subtitleEl     = document.querySelector('#header .subtitle');
    const subMaskCvs     = document.createElement('canvas');
    const subMaskCtx     = subMaskCvs.getContext('2d');
    const subRegionCvs   = document.createElement('canvas');
    const subRegionCtx   = subRegionCvs.getContext('2d');

    function drawSubtitle() {
      if (!titleFontReady || !mapReady) return;

      const dpr  = window.devicePixelRatio || 1;
      const rect = subtitleEl.getBoundingClientRect();
      const cw   = Math.round(rect.width  * dpr);
      const ch   = Math.round(rect.height * dpr);
      if (cw === 0 || ch === 0) return;

      if (subtitleCanvas.width !== cw || subtitleCanvas.height !== ch) {
        subtitleCanvas.width  = cw;  subtitleCanvas.height = ch;
        subtitleCanvas.style.width  = rect.width  + 'px';
        subtitleCanvas.style.height = rect.height + 'px';
        subMaskCvs.width   = cw;  subMaskCvs.height   = ch;
        subRegionCvs.width = cw;  subRegionCvs.height = ch;
      }

      const fontSize = parseFloat(getComputedStyle(subtitleEl).fontSize) * dpr;
      const letterSp = parseFloat(getComputedStyle(subtitleEl).letterSpacing) * dpr;
      subMaskCtx.clearRect(0, 0, cw, ch);
      subMaskCtx.font          = `italic 400 ${fontSize}px 'IM Fell DW Pica'`;
      subMaskCtx.letterSpacing = `${letterSp.toFixed(1)}px`;
      subMaskCtx.textAlign     = 'center';
      subMaskCtx.textBaseline  = 'middle';
      subMaskCtx.fillStyle     = 'white';
      subMaskCtx.fillText(subtitleEl.textContent.trim(), cw / 2, ch / 2);
      const maskData = subMaskCtx.getImageData(0, 0, cw, ch);

      subRegionCtx.clearRect(0, 0, cw, ch);
      subRegionCtx.drawImage(
        map.getCanvas(),
        Math.round(rect.left * dpr), Math.round(rect.top * dpr), cw, ch,
        0, 0, cw, ch
      );
      const mapPx = subRegionCtx.getImageData(0, 0, cw, ch).data;

      const out = subtitleCtx.createImageData(cw, ch);
      const md  = maskData.data;
      const od  = out.data;
      for (let i = 0; i < md.length; i += 4) {
        const a = md[i + 3];
        if (a < 6) continue;
        const lum = 0.299 * mapPx[i] + 0.587 * mapPx[i + 1] + 0.114 * mapPx[i + 2];
        const col = lum < LUM_THRESH ? GOLD : BURGUNDY;
        od[i] = col[0];  od[i+1] = col[1];  od[i+2] = col[2];  od[i+3] = Math.round(a * 0.75);
      }
      subtitleCtx.clearRect(0, 0, cw, ch);
      subtitleCtx.putImageData(out, 0, 0);
    }

    map.on('load', () => {
      mapReady = true;
      panTick();
    });

    // Graceful fallback if token is invalid
    map.on('error', e => {
      if (e && e.error && e.error.status === 401) {
        document.getElementById('map').style.background =
          'linear-gradient(135deg, #3a2a10 0%, #1e1408 40%, #0d0a04 100%)';
      }
    });
  </script>
